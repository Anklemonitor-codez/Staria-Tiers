name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Inject Supabase config + Admin email from GitHub Secrets into index.html
      - name: Inject config
        run: |
          sed -i \
            -e "s|YOUR_SUPABASE_URL|${{ secrets.SUPABASE_URL }}|g" \
            -e "s|YOUR_SUPABASE_ANON_KEY|${{ secrets.SUPABASE_ANON_KEY }}|g" \
            -e "s|YOUR_ADMIN_EMAIL|${{ secrets.ADMIN_EMAIL }}|g" \
            public/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
